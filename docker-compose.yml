services:
  tg-dashboard:
    build: .
    container_name: tg-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8700}:${PORT:-8700}"
    environment:
      - PORT=${PORT:-8700}
    volumes:
      # Persistent data (sessions, config, DBs, CSVs)
      - ./data:/app/data
      - ./config.json:/app/config.json
      - ./auth.json:/app/auth.json
      - ./campaign_templates.json:/app/campaign_templates.json
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8700}/login')"]
      interval: 30s
      timeout: 5s
      retries: 3
