services:
  tg-dashboard:
    build: .
    container_name: tg-manager
    restart: unless-stopped
    ports:
      - "${PORT:-8700}:${PORT:-8700}"
    environment:
      - PORT=${PORT:-8700}
    volumes:
      # Persistent data directory for all runtime files
      - ./data:/app/data
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8700}/login')"]
      interval: 30s
      timeout: 5s
      retries: 3
